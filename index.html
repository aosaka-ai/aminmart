<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AminMart Supermarket</title>
  </head>
  <body>
    <div id="root">
      <div style="height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; font-family: sans-serif; gap: 10px;">
        <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #16a34a; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p>Loading AminMart...</p>
        <p id="error-display" style="color: #ef4444; font-size: 12px; max-width: 80%; text-align: center;"></p>
      </div>
      <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      </style>
    </div>
    <script>
      console.log("HTML loaded, attempting to load main script...");
      window.onerror = function(msg, url, line, col, error) {
        var display = document.getElementById('error-display');
        if (display) {
          display.innerText = "Error: " + msg + "\nAt: " + url + ":" + line;
          display.style.display = 'block';
        }
        console.error(msg, url, line, col, error);
      };
      // Check if the main script loads
      setTimeout(function() {
        if (document.getElementById('root').innerHTML.includes('Loading AminMart...')) {
          var display = document.getElementById('error-display');
          if (display) {
            display.innerText = "The application is taking longer than expected to load. This usually happens if the script path is incorrect or blocked. Please ensure you are deploying the 'dist' folder correctly.";
          }
        }
      }, 8000);
    </script>
    <script type="module" src="./src/main.tsx" onload="console.log('Main script loaded successfully')" onerror="document.getElementById('error-display').innerText = 'Failed to load the main script. Please check the file path.'"></script>
  </body>
</html>
