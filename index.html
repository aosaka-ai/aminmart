<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AminMart Supermarket</title>
  </head>
  <body>
    <div id="root">
      <div style="height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; font-family: sans-serif; background: #f9fafb;">
        <div style="position: relative; width: 60px; height: 60px;">
          <div style="position: absolute; width: 100%; height: 100%; border: 4px solid #e5e7eb; border-radius: 50%;"></div>
          <div style="position: absolute; width: 100%; height: 100%; border: 4px solid transparent; border-top-color: #16a34a; border-radius: 50%; animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite;"></div>
        </div>
        <p style="margin-top: 20px; font-weight: 600; color: #374151; letter-spacing: -0.01em;">AminMart</p>
        <p style="margin-top: -10px; font-size: 13px; color: #6b7280;">Preparing your fresh groceries...</p>
        <p id="error-display" style="margin-top: 20px; color: #ef4444; font-size: 12px; max-width: 80%; text-align: center; display: none;"></p>
        <button id="clear-cache-btn" style="margin-top: 20px; padding: 8px 16px; background: #374151; color: white; border: none; border-radius: 6px; cursor: pointer; display: none; font-size: 12px;">Clear Browser Data & Reload</button>
      </div>
      <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      </style>
    </div>
    <script>
      document.getElementById('clear-cache-btn').onclick = function() {
        localStorage.clear();
        sessionStorage.clear();
        window.location.reload(true);
      };
      console.log("HTML loaded at: " + window.location.href);
      console.log("Attempting to load main script from: ./src/main.tsx");
      window.onerror = function(msg, url, line, col, error) {
        var display = document.getElementById('error-display');
        if (display) {
          display.innerText = "Error: " + msg + "\nAt: " + url + ":" + line;
          display.style.display = 'block';
        }
        console.error(msg, url, line, col, error);
      };
      // Check if the main script loads
      setTimeout(function() {
        var root = document.getElementById('root');
        if (root && root.innerHTML.includes('Preparing your fresh groceries...')) {
          var display = document.getElementById('error-display');
          if (display) {
            display.innerHTML = "The application is taking longer than expected to load.<br><br>" +
              "<strong>Possible reasons:</strong><br>" +
              "1. Slow internet connection.<br>" +
              "2. Script path error (check if 'dist' folder is deployed correctly).<br>" +
              "3. Browser incompatibility (try updating your browser).<br><br>" +
              "<small>Current Path: " + window.location.pathname + "</small>";
            var btn = document.getElementById('clear-cache-btn');
            if (btn) btn.style.display = 'block';
          }
        }
      }, 10000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
